id: "@treeseed/admin"
name: TreeSeed Admin
kind: node-typescript
type: node-library
repository: treeseed-ai/admin
publishTarget: npm
workflowTemplateVersion: "1"
githubEnvironments:
  - production
requiredSecrets:
  - NPM_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: npm
    name: "@treeseed/admin"
releaseGate:
  workflow: deploy.yml
