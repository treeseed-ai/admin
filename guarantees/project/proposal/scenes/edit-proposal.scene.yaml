schemaVersion: treeseed.scene/v1
id: project.proposal.edit-proposal.049
title: Edit Proposal
description: Scene scaffold for guarantee.project.proposal.edit-proposal.049. This scene is intentionally minimal until the workflow-specific acceptance steps are authored.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - Edit Proposal opens the canonical @treeseed/admin full page form workflow.
    - Edit Proposal exercises a service journey instead of only loading /app/work/proposals/seed-proposal/edit.
    - Edit Proposal records reviewable evidence for the visible result before activation.
  minimumSteps: 2
  requiresInteractiveAction: true
  consumesState:
    - key: auth.owner
      kind: user
    - key: project.primary
      kind: project
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop
  profiles:
    - id: desktop
      title: Desktop
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
setup:
  dev:
    required: true
    command: trsd dev start --web-runtime local --json
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-entry-route
    title: Open Edit Proposal
    action:
      goto: /app/work/proposals/seed-proposal/edit
    expect:
      urlIncludes: /app/work
  - id: inspect-service-surface
    title: Inspect Edit Proposal service surface
    action:
      keyboard: Tab
    expect:
      urlIncludes: /app/work
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training:
  formats:
    - json
    - markdown
    - vtt
    - srt
visualAudit:
  enabled: false
