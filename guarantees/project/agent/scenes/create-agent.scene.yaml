schemaVersion: treeseed.scene/v1
id: project.agent.create-agent.057
title: Create Agent
description: Scene scaffold for guarantee.project.agent.create-agent.057. This scene is intentionally minimal until the workflow-specific acceptance steps are authored.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - Create Agent opens the canonical @treeseed/admin project agent creation workflow.
    - A project operator can fill the agent form and queue the local content operation.
    - The UI shows reviewable operation feedback after submission.
  minimumSteps: 5
  requiresInteractiveAction: true
  consumesState:
    - key: auth.owner
      kind: user
    - key: project.primary
      kind: project
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop
  profiles:
    - id: desktop
      title: Desktop
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
setup:
  dev:
    required: true
    command: trsd dev start --web-runtime local --json
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-entry-route
    title: Open Create Agent
    action:
      goto: /app/projects/project-visual-audit-project/agents/new
    expect:
      urlIncludes: /app/projects/project-visual-audit-project/agents/new
      text: New agent
  - id: fill-agent-name
    title: Fill agent name
    action:
      fill:
        role: textbox
        name: Name
        value: Guarantee Review Agent {{runShort}}
    expect:
      text: New agent
  - id: fill-agent-description
    title: Fill agent description
    action:
      fill:
        role: textbox
        name: Description
        value: Reviews guarantee evidence and prepares implementation feedback for the TreeSeed market project.
    expect:
      text: New agent
  - id: fill-agent-prompt
    title: Fill agent prompt
    action:
      fill:
        role: textbox
        name: System prompt
        value: Review guarantee evidence, identify concrete UI defects, and produce concise implementation notes.
    expect:
      text: New agent
  - id: submit-agent
    title: Submit agent definition
    action:
      click:
        role: button
        name: Create agent
    expect:
      text: Queued. Waiting for the Treeseed operations runner
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training:
  formats:
    - json
    - markdown
    - vtt
    - srt
visualAudit:
  enabled: false
