schemaVersion: treeseed.scene/v1
id: team.team.create-team.012
title: Create Team
description: Acceptance scene for guarantee.team.team.create-team.012.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - Create Team opens the canonical @treeseed/admin full page form workflow.
    - A verified owner can fill and submit the team creation form.
    - The created team becomes visible in the authenticated team area for dependent journeys.
  minimumSteps: 5
  requiresInteractiveAction: true
  producesState:
    - key: team.primary
      kind: team
  consumesState:
    - key: auth.owner
      kind: user
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
  auth:
    role: owner
    required: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-entry-route
    title: Open Create Team
    action:
      goto: /app/teams/new
    expect:
      urlIncludes: /app/teams
      text: Create team
  - id: fill-team-name
    title: Fill team name
    action:
      fill:
        css: '#name'
        value: guarantee-team-{{runShort}}
    expect:
      text: Create team
  - id: fill-team-display-name
    title: Fill team display name
    action:
      fill:
        css: '#displayName'
        value: Guarantee Team {{runShort}}
    expect:
      text: Create team
  - id: fill-team-summary
    title: Fill team profile summary
    action:
      fill:
        role: textbox
        name: Profile summary
        value: Team created by the guarantee service journey for downstream UI verification.
    expect:
      text: Create team
  - id: submit-team
    title: Submit team creation
    action:
      click:
        role: button
        name: Create team
    expect:
      urlIncludes: /app/teams
  - id: inspect-service-surface
    title: Inspect Create Team service surface
    action:
      keyboard: Tab
    expect:
      urlIncludes: /app/teams
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
