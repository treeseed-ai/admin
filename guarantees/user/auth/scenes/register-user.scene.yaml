schemaVersion: treeseed.scene/v1
id: user.auth.register-user.001
title: Register User
description: Acceptance scene for guarantee.user.auth.register-user.001.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - anonymous user can open registration
    - registration form accepts required profile fields
    - registration submits into the email verification flow
  minimumSteps: 8
  requiresInteractiveAction: true
  producesState:
    - key: auth.owner
      kind: user
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
    - id: mobile_webkit
      title: Mobile WebKit
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-registration
    title: Open Register User
    action:
      goto: /auth/register
    expect:
      urlIncludes: /auth/register
      text: Create account
  - id: enter-first-name
    title: Enter first name
    action:
      fill:
        role: textbox
        name: First name
        value: Tree
    expect:
      visible:
        - role: textbox
          name: First name
  - id: enter-last-name
    title: Enter last name
    action:
      fill:
        role: textbox
        name: Last name
        value: Seed
    expect:
      visible:
        - role: textbox
          name: Last name
  - id: enter-username
    title: Enter username
    action:
      fill:
        role: textbox
        name: Username
        value: review-{{runShort}}
    expect:
      text: Username is available.
  - id: enter-email
    title: Enter email
    action:
      fill:
        role: textbox
        name: Email
        # Staging intentionally verifies the real SMTP delivery path. Use an
        # authorized mailbox and a run-specific plus address so every run is
        # independently traceable without reusing a prior registration.
        value: adrian.webb+review-{{runShort}}@knowledge.coop
    expect:
      visible:
        - role: textbox
          name: Email
  - id: enter-password
    title: Enter password
    action:
      fill:
        css: "#registerPassword"
        internal: true
        value: TreeSeedReviewPass123!
    expect:
      text: Password
  - id: confirm-password
    title: Confirm password
    action:
      fill:
        css: "[data-confirm-password-input]"
        internal: true
        value: TreeSeedReviewPass123!
    expect:
      text: Confirm password
  - id: submit-registration
    title: Submit registration
    action:
      click:
        role: button
        name: Create account
    expect:
      urlIncludes: /auth/check-email
      text: Check your email
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
