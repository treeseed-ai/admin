schemaVersion: treeseed.scene/v1
id: user.auth.user-login.004
title: User Login
description: Acceptance scene for guarantee.user.auth.user-login.004.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - anonymous user can open sign-in
    - sign-in form accepts credentials
    - sign-in submission reaches authenticated app shell or returns a visible auth error
  minimumSteps: 4
  requiresInteractiveAction: true
  consumesState:
    - key: auth.verified-owner
      kind: user
  producesState:
    - key: auth.session
      kind: user
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
    - id: mobile_webkit
      title: Mobile WebKit
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-sign-in
    title: Open User Login
    action:
      goto: /auth/sign-in
    expect:
      urlIncludes: /auth/sign-in
      text: Sign in
  - id: enter-identifier
    title: Enter email or username
    action:
      fill:
        role: textbox
        name: Email or username
        value: owner+{{runSlug}}@treeseed.local
    expect:
      visible:
        - role: textbox
          name: Email or username
  - id: enter-password
    title: Enter password
    action:
      fill:
        css: input[name='password']
        internal: true
        value: TreeSeedReviewPass123!
    expect:
      text: Password
  - id: submit-sign-in
    title: Submit sign in
    action:
      click:
        role: button
        name: Sign in
    expect:
      urlIncludes: /app
      visible:
        - scene: app-shell
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
