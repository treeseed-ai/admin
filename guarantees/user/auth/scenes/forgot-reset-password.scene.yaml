schemaVersion: treeseed.scene/v1
id: user.auth.forgot-reset-password.003
title: Forgot / Reset Password
description: Acceptance scene for guarantee.user.auth.forgot-reset-password.003.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - anonymous user can open password reset
    - reset form accepts account email
    - reset submission reaches the check-email flow
  minimumSteps: 3
  requiresInteractiveAction: true
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
    - id: mobile_webkit
      title: Mobile WebKit
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-password-reset
    title: Open Forgot / Reset Password
    action:
      goto: /auth/forgot-password
    expect:
      urlIncludes: /auth/forgot-password
      text: Reset password
  - id: enter-reset-email
    title: Enter reset email
    action:
      fill:
        role: textbox
        name: Email
        value: owner+{{runSlug}}@treeseed.local
    expect:
      visible:
        - role: textbox
          name: Email
  - id: submit-reset-request
    title: Submit reset request
    action:
      click:
        role: button
        name: Send reset link
    expect:
      text: Check your email
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
