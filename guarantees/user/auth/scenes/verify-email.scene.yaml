schemaVersion: treeseed.scene/v1
id: user.auth.verify-email.002
title: Verify Email
description: Acceptance scene for guarantee.user.auth.verify-email.002.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - newly registered user can open the email-check state
    - local Mailpit receives the confirmation message for the run-scoped email
    - following the confirmation link establishes the authenticated app session
  minimumSteps: 3
  requiresInteractiveAction: true
  consumesState:
    - key: auth.owner
      kind: user
  producesState:
    - key: auth.verified-owner
      kind: user
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
    - id: mobile_webkit
      title: Mobile WebKit
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-check-email
    title: Open email verification holding page
    action:
      goto: /auth/check-email?kind=verify
    expect:
      urlIncludes: /auth/check-email
      text: Check your email
  - id: confirm-latest-email
    title: Confirm latest registration email
    action:
      mailpitConfirmLatest:
        mailpitUrl: http://127.0.0.1:8025
        email: owner+{{runSlug}}@treeseed.local
        subjectIncludes: confirm
    expect:
      urlIncludes: /app
      visible:
        - scene: app-shell
  - id: inspect-authenticated-shell
    title: Inspect authenticated shell after confirmation
    action:
      goto: /app
    expect:
      urlIncludes: /app
      visible:
        - scene: app-shell
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
