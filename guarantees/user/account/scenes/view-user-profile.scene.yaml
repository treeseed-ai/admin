schemaVersion: treeseed.scene/v1
id: user.account.view-user-profile.010
title: View User Profile
description: Acceptance scene for guarantee.user.account.view-user-profile.010.
audience:
  - operator
  - evaluator
journey:
  kind: service
  proves:
    - View User Profile opens the public identity-only @treeseed/admin profile.
    - View User Profile does not expose project, catalog, or knowledge distribution links.
    - View User Profile records reviewable evidence for the visible result before activation.
  minimumSteps: 2
  requiresInteractiveAction: true
mode:
  test: true
  demo: true
  training: true
target:
  app: market
  environment: local
  baseUrl: auto
  browser: chromium
  viewport:
    width: 1600
    height: 900
devices:
  defaultProfile: desktop_chromium
  profiles:
    - id: desktop_chromium
      title: Desktop Chromium
      orientation: landscape
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      output:
        width: 1920
        height: 1080
      deviceScaleFactor: 1
      isMobile: false
      hasTouch: false
    - id: mobile_chromium
      title: Mobile Chromium
      orientation: portrait
      viewport:
        width: 390
        height: 844
      video:
        width: 390
        height: 844
      output:
        width: 390
        height: 844
      deviceScaleFactor: 2
      isMobile: true
      hasTouch: true
setup:
  dev:
    required: true
    reuseExisting: true
  auth:
    role: owner
    required: true
artifacts:
  trace: true
  video: true
  screenshots: true
  console: true
  network: true
  timeline: true
  appLogs: true
workflow:
  - id: open-entry-route
    title: Open account settings
    action:
      goto: /app/account
    expect:
      urlIncludes: /app/account
  - id: open-public-profile
    title: Follow the public profile link
    action:
      click:
        css: 'a[href^="/u/"]'
        internal: true
    expect:
      urlIncludes: /u/
  - id: inspect-identity-surface
    title: Inspect the identity-only profile
    action:
      keyboard: Tab
    expect:
      text: TreeSeed account
chapters: []
overlays: []
diagrams: []
render:
  remotion:
    composition: treeseed-training-default
    output:
      format: mp4
      fps: 30
      resolution:
        width: 1920
        height: 1080
    capture:
      viewport:
        width: 1600
        height: 900
      video:
        width: 1600
        height: 900
      evidenceFit: fixed-browser
runtime:
  mode: training
  timeouts:
    sceneSeconds: 300
    chapterSeconds: 120
    stepSeconds: 60
  checkpoints:
    enabled: true
    defaultResumable: true
    everyStep: true
  progress:
    heartbeatSeconds: 15
  failure:
    continueOnFailure: false
training: {}
visualAudit:
  enabled: false
