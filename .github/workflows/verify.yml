name: Verify

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        timeout-minutes: 20
        run: npm run release:setup

      - name: Verify package
        run: npm run verify:direct

      - name: Pack verified artifact
        run: mkdir -p artifacts && npm pack --json --ignore-scripts --pack-destination artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: admin-${{ github.sha }}
          path: artifacts/*.tgz
          if-no-files-found: error
